---
- name: Print LibreBooking database credentials
  ansible.builtin.set_fact:
    devture_playbook_runtime_messages_list: |
      {{
        devture_playbook_runtime_messages_list | default([])
        +
        [
          "Here is your LibreBooking Postgres database information:
          - database host: `" + librebooking_database_hostname + "`
          - database name: `" + librebooking_database_name + "`
          - database username: `" + librebooking_database_username + "`
          - database password: `" + librebooking_database_password + "`
          Enter these values on the installation wizard UI.

          Do NOT check 'Create the database' or 'Create the database user' — both already exist.
          Check 'Import sample data' to create the schema and initial admin account (admin/password)."
        ]
      }}
