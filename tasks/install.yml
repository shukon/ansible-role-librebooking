---
- name: Ensure LibreBooking paths exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: "{{ librebooking_uid }}"
    group: "{{ librebooking_gid }}"
  with_items:
    - "{{ librebooking_base_path }}"
    - "{{ librebooking_config_path }}"
    - "{{ librebooking_uploads_images_path }}"
    - "{{ librebooking_uploads_reservation_path }}"

- name: Ensure LibreBooking support files installed
  ansible.builtin.template:
    src: "{{ role_path }}/templates/{{ item }}.j2"
    dest: "{{ librebooking_base_path }}/{{ item }}"
    owner: "{{ librebooking_uid }}"
    group: "{{ librebooking_gid }}"
    mode: "0640"
  with_items:
    - env
    - labels
  register: librebooking_support_files_result

- name: Ensure LibreBooking container image is pulled via community.docker.docker_image
  when: devture_systemd_docker_base_container_image_pull_method == 'ansible-module'
  community.docker.docker_image:
    name: "{{ librebooking_container_image }}"
    source: "{{ 'pull' if ansible_version.major > 2 or ansible_version.minor > 7 else omit }}"
    force_source: "{{ librebooking_container_image_force_pull if ansible_version.major > 2 or ansible_version.minor >= 8 else omit }}"
    force: "{{ omit if ansible_version.major > 2 or ansible_version.minor >= 8 else librebooking_container_image_force_pull }}"
  register: librebooking_container_image_pull_result_ansible_module
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: librebooking_container_image_pull_result_ansible_module is not failed

- name: Ensure LibreBooking container image is pulled via ansible.builtin.command
  when: devture_systemd_docker_base_container_image_pull_method == 'command'
  ansible.builtin.command:
    cmd: "{{ devture_systemd_docker_base_host_command_docker }} pull {{ librebooking_container_image }}"
  register: librebooking_container_image_pull_result_command
  retries: "{{ devture_playbook_help_container_retries_count }}"
  delay: "{{ devture_playbook_help_container_retries_delay }}"
  until: librebooking_container_image_pull_result_command is not failed
  changed_when: "'Downloaded newer image' in librebooking_container_image_pull_result_command.stdout"

- name: Ensure LibreBooking container network is created via community.docker.docker_network
  when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
  community.docker.docker_network:
    enable_ipv6: "{{ devture_systemd_docker_base_ipv6_enabled }}"
    name: "{{ librebooking_container_network }}"
    driver: bridge
    driver_options: "{{ devture_systemd_docker_base_container_networks_driver_options }}"
  register: librebooking_network_creation_result

- name: Ensure LibreBooking container network is created via ansible.builtin.command
  when: devture_systemd_docker_base_container_network_creation_method == 'command'
  ansible.builtin.command:
    cmd: >-
      {{ devture_systemd_docker_base_host_command_docker }} network create
      {% if devture_systemd_docker_base_ipv6_enabled %}--ipv6{% endif %}
      {{ devture_systemd_docker_base_container_networks_driver_options_string }}
      {{ librebooking_container_network }}
  register: librebooking_network_creation_result
  changed_when: librebooking_network_creation_result.rc == 0
  failed_when: librebooking_network_creation_result.rc != 0 and 'already exists' not in librebooking_network_creation_result.stderr

- name: Ensure LibreBooking systemd service is present
  ansible.builtin.template:
    src: "{{ role_path }}/templates/systemd/librebooking.service.j2"
    dest: "{{ devture_systemd_docker_base_systemd_path }}/{{ librebooking_identifier }}.service"
    mode: "0644"
  register: librebooking_systemd_service_result

- name: Determine whether LibreBooking needs a restart
  ansible.builtin.set_fact:
    librebooking_restart_necessary: >-
      {{
        librebooking_support_files_result.changed | default(false)
        or librebooking_systemd_service_result.changed | default(false)
        or librebooking_container_image_pull_result_ansible_module.changed | default(false)
        or librebooking_container_image_pull_result_command.changed | default(false)
      }}
