---
# Project source code URL: https://github.com/LibreBooking/librebooking

librebooking_enabled: false

librebooking_identifier: librebooking
librebooking_base_path: "/{{ librebooking_identifier }}"
librebooking_config_path: "{{ librebooking_base_path }}/config"
librebooking_uploads_images_path: "{{ librebooking_base_path }}/uploads/images"
librebooking_uploads_reservation_path: "{{ librebooking_base_path }}/uploads/reservation"

# renovate: datasource=docker depName=librebooking/librebooking
librebooking_version: 4.2.0

librebooking_uid: ""
librebooking_gid: ""

# The scheme used for serving LibreBooking.
librebooking_scheme: https

# The hostname at which LibreBooking is served.
librebooking_hostname: ""

# The path at which LibreBooking is served.
# This value must either be `/` or not end with a slash (e.g. `/librebooking`).
librebooking_path_prefix: /

librebooking_container_image: "{{ librebooking_container_image_registry_prefix }}librebooking/librebooking:{{ librebooking_container_image_tag }}"
librebooking_container_image_tag: "{{ librebooking_version }}"
librebooking_container_image_registry_prefix: "{{ librebooking_container_image_registry_prefix_upstream }}"
librebooking_container_image_registry_prefix_upstream: "{{ librebooking_container_image_registry_prefix_upstream_default }}"
librebooking_container_image_registry_prefix_upstream_default: docker.io/
librebooking_container_image_force_pull: "{{ librebooking_container_image.endswith(':latest') }}"
# TODO: add tasks to self-build the image

# The base container network. It will be auto-created by this role if it doesn't exist already.
librebooking_container_network: "{{ librebooking_identifier }}"

# Control if the container network is deleted on uninstalling.
librebooking_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `librebooking_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
librebooking_container_http_host_bind_port: ""

# The port number in the container
librebooking_container_http_port: 8080

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
librebooking_container_additional_networks: "{{ librebooking_container_additional_networks_auto + librebooking_container_additional_networks_custom }}"
librebooking_container_additional_networks_auto: []
librebooking_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
librebooking_container_additional_volumes: "{{ librebooking_container_additional_volumes_auto + librebooking_container_additional_volumes_custom }}"
librebooking_container_additional_volumes_auto: []
librebooking_container_additional_volumes_custom: []

# librebooking_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `librebooking_container_labels_additional_labels_custom`.
librebooking_container_labels_traefik_enabled: true
librebooking_container_labels_traefik_docker_network: "{{ traefik_container_network | default('traefik') }}"
librebooking_container_labels_traefik_hostname: "{{ librebooking_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/librebooking`).
librebooking_container_labels_traefik_path_prefix: "{{ librebooking_path_prefix }}"
librebooking_container_labels_traefik_rule: "Host(`{{ librebooking_container_labels_traefik_hostname }}`){% if librebooking_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ librebooking_container_labels_traefik_path_prefix }}`){% endif %}"
librebooking_container_labels_traefik_priority: 0
librebooking_container_labels_traefik_entrypoints: web-secure
librebooking_container_labels_traefik_tls: "{{ librebooking_container_labels_traefik_entrypoints != 'web' }}"
librebooking_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `librebooking_container_labels_traefik_additional_request_headers_custom`.
librebooking_container_labels_traefik_additional_request_headers: "{{ librebooking_container_labels_traefik_additional_request_headers_auto | combine(librebooking_container_labels_traefik_additional_request_headers_custom) }}"
librebooking_container_labels_traefik_additional_request_headers_auto: {}
librebooking_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `librebooking_container_labels_traefik_additional_response_headers_custom`.
librebooking_container_labels_traefik_additional_response_headers: "{{ librebooking_container_labels_traefik_additional_response_headers_auto | combine(librebooking_container_labels_traefik_additional_response_headers_custom) }}"
librebooking_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': librebooking_http_header_xss_protection} if librebooking_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': librebooking_http_header_content_type_options} if librebooking_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': librebooking_http_header_content_security_policy} if librebooking_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': librebooking_http_header_permissions_policy} if librebooking_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': librebooking_http_header_strict_transport_security} if librebooking_http_header_strict_transport_security and librebooking_container_labels_traefik_tls else {})
  }}
librebooking_container_labels_traefik_additional_response_headers_custom: {}

# librebooking_container_labels_additional_labels contains a list of additional labels to add to the container.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `librebooking_container_labels_additional_labels_custom`
#
# Example:
# librebooking_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
librebooking_container_labels_additional_labels: "{{ librebooking_container_labels_additional_labels_auto + librebooking_container_labels_additional_labels_custom }}"
librebooking_container_labels_additional_labels_auto: []
librebooking_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command).
librebooking_container_extra_arguments: "{{ librebooking_container_extra_arguments_auto + librebooking_container_extra_arguments_custom }}"
librebooking_container_extra_arguments_auto: []
librebooking_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
librebooking_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
librebooking_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
librebooking_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
librebooking_http_header_permissions_policy: "{{ 'interest-cohort=()' if librebooking_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
librebooking_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if librebooking_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `librebooking_http_header_permissions_policy`
librebooking_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `librebooking_http_header_strict_transport_security`
librebooking_hsts_preload_enabled: false

# List of systemd services that the LibreBooking systemd service depends on.
librebooking_systemd_required_services_list: "{{ librebooking_systemd_required_services_list_default + librebooking_systemd_required_services_list_auto + librebooking_systemd_required_services_list_custom }}"
librebooking_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
librebooking_systemd_required_services_list_auto: []
librebooking_systemd_required_services_list_custom: []

# List of systemd services that the LibreBooking systemd service wants.
librebooking_systemd_wanted_services_list: "{{ librebooking_systemd_wanted_services_list_default + librebooking_systemd_wanted_services_list_auto + librebooking_systemd_wanted_services_list_custom }}"
librebooking_systemd_wanted_services_list_default: []
librebooking_systemd_wanted_services_list_auto: []
librebooking_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
librebooking_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
librebooking_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
librebooking_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
librebooking_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ librebooking_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ librebooking_container_stop_grace_time_seconds }} {{ librebooking_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ librebooking_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ librebooking_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ librebooking_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ librebooking_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ librebooking_identifier }} after {{ librebooking_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Specify the timezone (e.g. Europe/Berlin)
librebooking_environment_variables_lb_default_timezone: UTC

# Specify database configuration
librebooking_database_hostname: ""
librebooking_database_username: librebooking
librebooking_database_password: ""
librebooking_database_name: librebooking

# Specify installation password used to access the /install/ setup wizard.
librebooking_environment_variables_install_password: ""

librebooking_environment_variables_lb_logging_folder: /var/log/librebooking

# Specify log level
# Valid values: none, debug, error
librebooking_environment_variables_lb_logging_level: none

librebooking_environment_variables_lb_logging_sql: false

# Control if built-in cron is enabled for background jobs (reminder emails, etc.)
librebooking_environment_variables_lb_cron_enabled: false

# Control if it is allowed for users to self-register accounts.
# You may wish to allow it temporarily to register your admin account if you did not import sample data during the first installation
librebooking_environment_variables_lb_registration_allow_self_registration: false

# Additional environment variables.
# Environment variable names follow the pattern: LB_<CONFIG_KEY_UPPERCASED>
# See: https://librebooking.readthedocs.io/en/stable/BASIC-CONFIGURATION.html
#
# Example:
# librebooking_environment_variables_additional_variables: |
#   LB_APP_TITLE='My Booking System'
librebooking_environment_variables_additional_variables: ""

# librebooking_restart_necessary controls whether the LibreBooking systemd
# service will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
librebooking_restart_necessary: false
